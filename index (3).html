<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Cigarros" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Cigarros</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --ios6-bg-top: #1c1c1e;
      --ios6-bg-bot: #0a0a0c;
      --linen: #f5f0e8;
      --leather-dark: #3d2b1f;
      --leather-mid: #6b4226;
      --leather-light: #a0673a;
      --leather-highlight: #c98a5e;
      --stitch: #e8d5b0;
      --red: #ff3b30;
      --red-dark: #c0392b;
      --green: #4cd964;
      --green-dark: #27ae60;
      --silver: #c8c8cc;
      --silver-dark: #8e8e93;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, var(--ios6-bg-top) 0%, var(--ios6-bg-bot) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100dvh;
      padding: 0 0 20px 0;
    }

    /* ── NAVIGATION BAR ── */
    .nav-bar {
      width: 100%;
      height: 44px;
      background: linear-gradient(180deg, #4a4a4c 0%, #2e2e30 50%, #242426 100%);
      border-bottom: 1px solid #111;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.15),
        0 1px 3px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 -1px 0 rgba(0,0,0,0.6);
      letter-spacing: -0.3px;
    }

    /* ── MAIN CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 20px;
      width: 100%;
    }

    /* ── LEATHER BOOK ── */
    .book {
      width: min(320px, 88vw);
      background:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.04) 2px,
          rgba(0,0,0,0.04) 4px
        ),
        linear-gradient(160deg, var(--leather-highlight) 0%, var(--leather-mid) 30%, var(--leather-dark) 80%, #1e110a 100%);
      border-radius: 12px;
      padding: 5px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 8px 32px rgba(0,0,0,0.7),
        0 2px 4px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
    }

    /* Spine line */
    .book::before {
      content: '';
      position: absolute;
      left: 22px;
      top: 5px;
      bottom: 5px;
      width: 3px;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.5) 100%);
      border-radius: 2px;
      box-shadow: 1px 0 0 rgba(255,255,255,0.1);
    }

    .book-inner {
      background: linear-gradient(170deg, #fdf8f0 0%, #f5ede0 40%, #ede0cc 100%);
      border-radius: 8px;
      padding: 24px 24px 20px 32px;
      position: relative;
      overflow: hidden;
      height: 260px;
  display: flex;
  flex-direction: column;
}
    }

    /* Paper lines */
    .book-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 27px,
        rgba(180, 160, 130, 0.25) 27px,
        rgba(180, 160, 130, 0.25) 28px
      );
      pointer-events: none;
    }

    /* Red margin line */
    .book-inner::after {
      content: '';
      position: absolute;
      left: 28px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(220, 80, 80, 0.3);
      pointer-events: none;
    }

    .book-date {
      font-size: 11px;
      color: #8c7660;
      margin-bottom: 6px;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .book-label {
      font-size: 13px;
      font-weight: 700;
      color: #5c4030;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .book-count {
  font-size: 72px;
  font-weight: 300;
  color: #2c1a0e;
  line-height: 1;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
  font-variant-numeric: tabular-nums;
  transition: transform 0.08s ease;
  text-align: center;
  width: 100%;
  font-family: SimSun, serif;
}

    .book-count.bump {
      transform: scale(1.12);
    }

    .book-sublabel {
      font-size: 12px;
      color: #7a5e42;
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
    }

    /* Tally marks */
    .tally-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 16px;
      position: relative;
      z-index: 1;
      min-height: 24px;
    }

    .tally-group {
      display: flex;
      align-items: center;
      gap: 1px;
      margin-right: 4px;
    }

    .tally-mark {
      width: 3px;
      height: 18px;
      background: #3a2010;
      border-radius: 1px;
      opacity: 0.7;
    }

    .tally-cross {
      width: 22px;
      height: 3px;
      background: #3a2010;
      border-radius: 1px;
      opacity: 0.7;
      position: absolute;
      top: 50%;
      left: -3px;
      transform: translateY(-50%) rotate(-12deg);
    }

    .tally-group-wrap {
      position: relative;
    }

    /* ── MAIN BUTTON ── */
    .btn-add {
      width: min(220px, 68vw);
      height: 66px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      position: relative;
      outline: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      background: linear-gradient(180deg,
        #ff6b5b 0%,
        #ff3b30 30%,
        #d32f22 70%,
        #b71c1c 100%
      );
      
    }
    .btn-main-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
.btn-square {
  width: 60px;
  height: 66px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 -1px 0 rgba(0,0,0,0.4);

  background: linear-gradient(180deg,
    #5ac8fa 0%,
    #1d68b8b7 40%,
    #0243a5b7 100%
  );

  box-shadow:
    inset 0 3px 6px rgba(0,0,0,0.5),
    inset 0 -2px 3px rgba(255,255,255,0.2),
    0 2px 4px rgba(0,0,0,0.5);

  transition: transform 0.08s ease, box-shadow 0.08s ease;
}

.btn-square:active {
  transform: scale(0.95);
  box-shadow:
    inset 0 4px 8px rgba(0,0,0,0.7),
    inset 0 -2px 3px rgba(255,255,255,0.15);
}
    .btn-add::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,0.08) 50%,
        transparent 51%
      );
    }

    .btn-add:active {
      transform: scale(0.95) translateY(2px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.2) inset,
        0 -1px 0 rgba(0,0,0,0.3) inset,
        0 2px 6px rgba(255,59,48,0.3),
        0 1px 2px rgba(0,0,0,0.4);
    }

    .btn-add-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      position: relative;
      z-index: 1;
    }

    .btn-add-icon {
      font-size: 22px;
      line-height: 1;
    }

    .btn-add-text {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 -1px 0 rgba(0,0,0,0.4);
      letter-spacing: 0.3px;
    }
    .history-list {
  display: none;
  width: 100%;
  flex: 1; /* 👈 ocupa el espacio disponible */
  overflow-y: auto;

  font-size: 13px;
  color: #3a2a1a;
  line-height: 1.6;
  padding-right: 4px;

  position: relative;
  z-index: 1;
}

.history-list.active {
  display: block;
}

.history-item {
  padding: 2px 0;
  border-bottom: 1px dashed rgba(120, 90, 60, 0.2);
}

    /* ── BOTTOM BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 16px;
      width: min(320px, 88vw);
      margin-top: 90px;

    }

    .btn-small {
      flex: 1;
      height: 44px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      position: relative;
      outline: none;
      transition: transform 0.08s ease;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 -1px 0 rgba(0,0,0,0.4);
      letter-spacing: 0.2px;
    }

    .btn-small::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 50%,
        transparent 51%
      );
    }

    .btn-small:active {
      transform: scale(0.95);
      opacity: 0.85;
    }

    .btn-undo {
      background: linear-gradient(180deg, #636366 0%, #3a3a3c 70%, #2c2c2e 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.15) inset,
        0 3px 8px rgba(0,0,0,0.4);
    }

    .btn-reset {
      background: linear-gradient(180deg, #ff9f0a 0%, #d4800a 70%, #b06808 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.2) inset,
        0 3px 8px rgba(255,159,10,0.3);
    }

    /* ── CONFIRM MODAL ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: min(270px, 80vw);
      background: linear-gradient(180deg, #f0f0f0 0%, #e0e0e0 100%);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.8) inset;
      transform: scale(0.85);
      transition: transform 0.2s ease;
    }

    .overlay.visible .modal {
      transform: scale(1);
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #1c1c1e;
      text-align: center;
      padding: 16px 16px 4px;
    }

    .modal-msg {
      font-size: 13px;
      color: #444;
      text-align: center;
      padding: 4px 16px 16px;
    }

    .modal-divider {
      height: 1px;
      background: #b0b0b0;
    }

    .modal-buttons {
      display: flex;
    }

    .modal-btn {
      flex: 1;
      height: 44px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .modal-btn:active { background: rgba(0,0,0,0.08); }

    .modal-btn-cancel {
      color: #1c1c1e;
      border-right: 1px solid #b0b0b0;
      font-weight: 400;
    }

    .modal-btn-confirm {
      color: var(--red);
      font-weight: 700;
    }

    /* ── FEEDBACK ── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="nav-bar">
    <span class="nav-title">Cigarros</span>
  </div>

  <div class="content">

    <div class="book">
      <div class="book-inner">
        <div class="book-date" id="fecha">Hoy</div>
        <div class="book-label"> hoy</div>
        <div class="book-count" id="counter">0</div>
        <div class="history-list" id="historyList"></div>
        <div class="book-sublabel" id="sublabel">cigarrillos</div>
        <div class="tally-row" id="tally"></div>
      </div>
    </div>

    <div class="btn-main-row">
  <button class="btn-add" id="btnAdd">
    <div class="btn-add-inner">
      <div class="btn-add-icon">🚬</div>
    </div>
  </button>

  <button class="btn-square" id="btnNew">
    📝
  </button>
</div>

    <div class="btn-row">
      <button class="btn-small btn-undo" id="btnUndo">↩ Deshacer</button>
      <button class="btn-small btn-reset" id="btnReset">Reiniciar</button>
    </div>

  </div>

  <!-- Confirm modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-title">Reiniciar contador</div>
      <div class="modal-msg">¿Seguro que quieres poner el contador en cero?</div>
      <div class="modal-divider"></div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" id="btnCancel">Cancelar</button>
        <button class="modal-btn modal-btn-confirm" id="btnConfirm">Reiniciar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  function formatEntry(dateStr) {
  const d = new Date(dateStr);

  const day = d.toLocaleDateString('es-CO', { weekday: 'long' });
  const dayNum = d.getDate();

  const time = d.toLocaleTimeString('es-CO', {
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  });

  return `${day}, ${dayNum}: ${time}`;
}
function renderHistory() {
  const el = document.getElementById('historyList');
  el.innerHTML = '';

  history.slice().reverse().forEach(item => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.textContent = formatEntry(item);
    el.appendChild(div);
  });
}
  // ── State ──
  const KEY = 'cig_v2';
  let count = 0;
  let lastDate = '';
  let history = [];
  let historyVisible = false;

  function todayStr() {
    return new Date().toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'long' });
  }

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.dateKey === todayKey()) {
        count = data.count || 0;
        history = data.history || [];
      } else {
        count = 0; // new day
      }
    } catch(e) {}
  }

  function save() {
  localStorage.setItem(KEY, JSON.stringify({ 
    count, 
    dateKey: todayKey(),
    history
  }));
}

  // ── Render ──
  function render() {
    document.getElementById('counter').textContent = count;
    document.getElementById('fecha').textContent = todayStr();
    renderTally();
  }

  function renderTally() {
    const el = document.getElementById('tally');
    el.innerHTML = '';
    const groups = Math.floor(count / 5);
    const rem = count % 5;

    for (let g = 0; g < groups; g++) {
      const wrap = document.createElement('div');
      wrap.className = 'tally-group-wrap';
      const group = document.createElement('div');
      group.className = 'tally-group';
      for (let i = 0; i < 4; i++) {
        const m = document.createElement('div');
        m.className = 'tally-mark';
        group.appendChild(m);
      }
      const cross = document.createElement('div');
      cross.className = 'tally-cross';
      group.style.position = 'relative';
      group.appendChild(cross);
      wrap.appendChild(group);
      el.appendChild(wrap);
    }

    if (rem > 0) {
      const group = document.createElement('div');
      group.className = 'tally-group';
      for (let i = 0; i < rem; i++) {
        const m = document.createElement('div');
        m.className = 'tally-mark';
        group.appendChild(m);
      }
      el.appendChild(group);
    }
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ── Bump animation ──
  function bump() {
    const el = document.getElementById('counter');
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 120);
  }

  // ── Haptics ──
  function haptic() {
    if (navigator.vibrate) navigator.vibrate(30);
  }

  // ── Buttons ──
  document.getElementById('btnAdd').addEventListener('click', () => {
    count++;
    history.push(new Date().toISOString());
    save();
    render();
    bump();
    haptic();
  });

  document.getElementById('btnUndo').addEventListener('click', () => {
    if (count <= 0) { showToast('Ya estás en cero 🙂'); return; }
    count--;
    save();
    render();
    haptic();
    showToast('Deshecho');
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    document.getElementById('overlay').classList.add('visible');
  });

  document.getElementById('btnNew').addEventListener('click', () => {
  historyVisible = !historyVisible;

  const counter = document.getElementById('counter');
  const list = document.getElementById('historyList');
  const sublabel = document.getElementById('sublabel');

  if (historyVisible) {
    counter.style.display = 'none';
    sublabel.style.display = 'none';
    list.classList.add('active');
    renderHistory();
  } else {
    counter.style.display = 'block';
    sublabel.style.display = 'block';
    list.classList.remove('active');
  }
});

  document.getElementById('btnCancel').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('visible');
  });

  document.getElementById('btnConfirm').addEventListener('click', () => {
    count = 0;
    save();
    render();
    document.getElementById('overlay').classList.remove('visible');
    showToast('Reiniciado ✓');
  });

  document.getElementById('overlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('visible');
  });

  // ── Init ──
  load();
  render();
</script>

</body>
</html>
